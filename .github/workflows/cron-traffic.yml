name: Trigger PennDOT/HERE traffic cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron-traffic endpoint
        run: |
          curl -sf -X GET "https://goatvisionphilly.vercel.app/api/cron-traffic" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
